<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sri Recreation</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  color: white;
  text-align: center;
  overflow-x: hidden;

  background: radial-gradient(circle at 20% 30%, rgba(255,215,0,0.15), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(255,215,0,0.1), transparent 40%),
              #000;
  animation: moveGlow 10s ease-in-out infinite alternate;
}

@keyframes moveGlow {
  0% { background-position: 20% 30%, 80% 70%; }
  50% { background-position: 40% 60%, 60% 40%; }
  100% { background-position: 20% 30%, 80% 70%; }
}

/* HEADER */
header {
  padding: 50px;
  background: #111;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from { box-shadow: 0 0 10px gold; }
  to { box-shadow: 0 0 30px gold, 0 0 60px rgba(255,215,0,0.5); }
}

header h1 {
  font-size: 40px;
  animation: textGlow 2s infinite alternate;
}

@keyframes textGlow {
  from { color: white; }
  to { color: gold; }
}

/* SECTION */
.section {
  padding: 40px;
  padding-bottom: 80px;
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BUTTON */
.btn {
  background: gold;
  color: black;
  padding: 10px 20px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  transform: scale(1.1);
}

/* GALLERY */
.gallery img {
  width: 200px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* PRICING */
.pricing {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  transition: 0.3s;
}

.card img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px gold;
}

/* SLIDER */
.slider {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 1000;
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 0.5s ease-in-out;
}

.slides img {
  min-width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  font-size: 40px;
  color: white;
  cursor: pointer;
  transform: translateY(-50%);
}

.left { left: 20px; }
.right { right: 20px; }

/* CLOSE */
.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  cursor: pointer;
}

/* BACKGROUND EFFECT */
.bg-animation span {
  position: fixed;
  width: 100px;
  height: 100px;
  background: rgba(255,215,0,0.2);
  border-radius: 50%;
  animation: float 10s infinite;
}

.bg-animation span:nth-child(1){top:10%;left:20%;}
.bg-animation span:nth-child(2){top:50%;left:70%;}
.bg-animation span:nth-child(3){top:80%;left:30%;}
.bg-animation span:nth-child(4){top:30%;left:80%;}

@keyframes float {
  0%{transform:translateY(0);}
  50%{transform:translateY(-50px);}
  100%{transform:translateY(0);}
}

/* FORM */
form input, form select, form textarea {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
}

button {
  background: gold;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<div class="bg-animation">
  <span></span><span></span><span></span><span></span>
</div>

<header>
  <h1>Sri Recreation</h1>
  <p>Turning Your Memories into Beautiful Hand-Drawn Art</p>
</header>

<!-- PORTFOLIO -->
<div class="section">
  <h2>Welcome to Sri Artworks</h2>
  <div class="gallery">
    <img src="kayalart.jpg">
    <img src="eyeart.jpg">
    <img src="sitaramam.jpg">
  </div>
  <br>
  <a class="btn" href="#order">Order Now</a>
</div>

<!-- PRICING -->
<div class="section">
  <h2>Pricing</h2>

  <div class="pricing">

    <div class="card">
      <img src="vijayart1.jpg" onclick="openSlider('a5')">
      <h3>A5</h3>
      <p>₹299</p>
    </div>

    <div class="card">
      <img src="masterart.jpg" onclick="openSlider('a4')">
      <h3>A4</h3>
      <p>₹499</p>
    </div>

    <div class="card">
      <img src="dhanushart.jpg" onclick="openSlider('a3')">
      <h3>A3</h3>
      <p>₹999</p>
    </div>

  </div>
</div>

<!-- SLIDERS -->

<div class="slider" id="a5">
  <span class="close" onclick="closeSlider('a5')">&times;</span>
  <span class="arrow left" onclick="prevSlide()">❮</span>
  <span class="arrow right" onclick="nextSlide()">❯</span>
  <div class="slides">
    <img src="samanthaart.jpg">
    <img src="dhanushart2.jpg">
    <img src="doctorart.jpg">
  </div>
</div>

<div class="slider" id="a4">
  <span class="close" onclick="closeSlider('a4')">&times;</span>
  <span class="arrow left" onclick="prevSlide()">❮</span>
  <span class="arrow right" onclick="nextSlide()">❯</span>
  <div class="slides">
    <img src="vijayart2.jpg">
    <img src="anuakkaart.jpg">
    <img src="nayantharaart.jpg">
  </div>
</div>

<div class="slider" id="a3">
  <span class="close" onclick="closeSlider('a3')">&times;</span>
  <span class="arrow left" onclick="prevSlide()">❮</span>
  <span class="arrow right" onclick="nextSlide()">❯</span>
  <div class="slides">
    <img src="eyeart.jpg">
    <img src="vijayart3.jpg">
    <img src="dogart.jpg">
  </div>
</div>

<!-- ORDER -->
<div class="section" id="order">
  <h2>Order Your Portrait</h2>
  <form onsubmit="sendToWhatsApp(event)">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>

  <select id="size">
    <option>A5</option>
    <option>A4</option>
    <option>A3</option>
  </select>

  <textarea id="details" placeholder="Extra details"></textarea>

  <button type="submit">Submit Order</button>
</form>
</div>

<!-- CONTACT -->
<div class="section">
  <h2>Contact</h2>
  <a href="https://wa.me/918508287123" class="btn">WhatsApp</a>
  <br><br>
  <a href="https://instagram.com/sri_recreation" class="btn">Instagram</a>
</div>

<script>
let currentIndex = 0;
let currentSlider = null;

function openSlider(id) {
  currentSlider = document.getElementById(id);
  currentSlider.style.display = "block";
  currentIndex = 0;
  updateSlide();
}

function closeSlider(id) {
  document.getElementById(id).style.display = "none";
}

function updateSlide() {
  const slides = currentSlider.querySelector(".slides");
  slides.style.transform = `translateX(-${currentIndex * 100}%)`;
}

function nextSlide() {
  const total = currentSlider.querySelectorAll(".slides img").length;
  currentIndex = (currentIndex + 1) % total;
  updateSlide();
}

function prevSlide() {
  const total = currentSlider.querySelectorAll(".slides img").length;
  currentIndex = (currentIndex - 1 + total) % total;
  updateSlide();
}

/* Whatsapp Message*/

function sendToWhatsApp(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let size = document.getElementById("size").value;
  let details = document.getElementById("details").value;

  let message = `New Order:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Size: ${size}%0A
Details: ${details}`;

  let whatsappURL = `https://wa.me/918508287123?text=${message}`;

  window.open(whatsappURL, "_blank");
}


function sendToWhatsApp(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let size = document.getElementById("size").value;
  let details = document.getElementById("details").value;
  let photo = document.getElementById("photo").files[0];

  if (!photo) {
    alert("Please upload your reference photo");
    return;
  }

  let message = `🎨 *New Art Order!* %0A
👤 Name: ${name} %0A
📞 Phone: ${phone} %0A
📏 Size: ${size} %0A
📝 Details: ${details} %0A
📸 I have attached my photo below`;

  let whatsappURL = `https://wa.me/918508287123?text=${encodeURIComponent(message)}`;

  // Open WhatsApp with message
  window.open(whatsappURL, "_blank");

  // Show instruction
  alert("After opening WhatsApp, please attach your photo and send 👍");
}
let message = `✨ *Sri Recreation Order* ✨ %0A...`;

/* Swipe */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  if (!currentSlider) return;

  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (diff > 50) nextSlide();
  else if (diff < -50) prevSlide();
});
</script>

</body>
</html>
